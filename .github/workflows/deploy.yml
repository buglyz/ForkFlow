# 推送 main 时自动部署。Secrets：CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID、CLOUDFLARE_KV_NAMESPACE_ID（在 Cloudflare 创建 KV 后把 id 填到这里，部署时自动绑定）
name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject KV namespace id
        run: sed -i.bak 's/REPLACE_WITH_KV_NAMESPACE_ID/'"${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"'/g' wrangler.toml
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
